# SonarCloud analysis WITH test coverage (CI-based scanner).
#
# One-time setup:
#   - Add a SONAR_TOKEN GitHub secret. If <owner> is a GitHub ORGANIZATION, use an org secret
#     (one secret, shared by all repos). If <owner> is a PERSONAL user account, there is no
#     shared secret (gh secret set --org returns 404) — set it PER REPO, reusing the same
#     SonarCloud token value:  gh secret set SONAR_TOKEN --repo <owner>/<repo>
#   - Turn Automatic Analysis OFF for this project (SonarCloud > Project > Administration >
#     Analysis Method) — Automatic Analysis and CI-based analysis are mutually exclusive.
#
# Replace <PROJECT_KEY> and <ORG_KEY>. Find them in SonarCloud (Project > Information, or the
# "Analyze with GitHub Actions" tutorial). For GitHub-imported projects the project key is
# usually <GitHubOrg>_<repo> and the org key is the lowercase org slug. You can also read them
# from the public API: curl -s "https://sonarcloud.io/api/components/show?component=<PROJECT_KEY>"
#
# Exclude non-library projects (demos/samples/harnesses) so coverage reflects the shipped code,
# e.g. add to the begin command:  /d:sonar.exclusions="**/*TestHarness/**"
name: SonarCloud

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  sonar:
    name: Build, test & analyze
    runs-on: ubuntu-latest
    # Skip PRs from forks — they can't access the SONAR_TOKEN secret.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0   # full history for accurate new-code / blame

      - name: Set up JDK (required by the scanner)
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5
        with:
          dotnet-version: 8.0.x

      - name: Cache SonarCloud packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install scanner + coverage tools
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-coverage

      - name: Build, test (with coverage) & analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:"<PROJECT_KEY>" /o:"<ORG_KEY>" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml
          dotnet build --configuration Release
          dotnet-coverage collect "dotnet test --configuration Release --no-build" -f xml -o coverage.xml
          dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"
