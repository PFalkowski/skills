# CD — publish to NuGet on a vX.Y.Z tag, using Trusted Publishing (OIDC). No long-lived key.
# Version is derived from the tag. Tests gate the publish. Pin action majors to current
# Node-LTS-native versions (verify latest, incl. gh api repos/NuGet/login/releases/latest).
#
# One-time setup the maintainer must do:
#   - NuGet.org Trusted Publishing policy: owner, repo, and workflow file == this filename.
#   - Repo variable NUGET_USER = NuGet account name (a variable, NOT a secret).
name: Publish NuGet

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required to mint the GitHub OIDC token for NuGet Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x   # current LTS — verify latest

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Publishing version $V"

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack path/to/Library.csproj --configuration Release --output ./artifacts -p:Version=${{ steps.ver.outputs.version }}

      - name: NuGet auth (Trusted Publishing via OIDC)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
